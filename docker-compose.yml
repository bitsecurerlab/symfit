version: '3.8'

services:
  # Build SymFit image with plugin support
  symfit-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: symfit:dev
    container_name: symfit-dev
    working_dir: /workspace
    volumes:
      # Mount source code from host
      - .:/workspace
      # Mount /tmp for test binaries
      - /tmp:/tmp
    environment:
      - CC=clang-12
      - CXX=clang++-12
    command: /bin/bash
    stdin_open: true
    tty: true
